[server]
root_url = https://monitor.comradebot.cc
domain = monitor.comradebot.cc

[security]
# Disable CORS since we're behind a reverse proxy on the same domain
cors_enabled = false
# If CORS is needed, uncomment and configure:
# cors_enabled = true
# cors_allow_origins = https://monitor.comradebot.cc
# cors_allow_credentials = true

cookie_secure = true
cookie_samesite = lax
allow_embedding = true

[users]
allow_sign_up = false

[analytics]
reporting_enabled = false

[log]
level = warn

[server]
# Root URL must match the public URL exactly
root_url = https://monitor.comradebot.cc
domain = monitor.comradebot.cc
# Enable serving from subpath (if needed)
serve_from_sub_path = false
# Trust reverse proxy headers
enable_gzip = true

[security]
# CORS configuration - enable and allow the origin
cors_enabled = true
cors_allow_origins = https://monitor.comradebot.cc
cors_allow_credentials = true
# Cookie settings for HTTPS behind reverse proxy
cookie_secure = true
cookie_samesite = lax
allow_embedding = true
# Disable strict origin checking when behind trusted reverse proxy
strict_transport_security = true
strict_transport_security_max_age_seconds = 86400
content_security_policy = false

[users]
allow_sign_up = false
allow_org_create = false

[analytics]
reporting_enabled = false
check_for_updates = false

[log]
level = warn
mode = console

[auth]
# Disable login form if using external auth (adjust as needed)
disable_login_form = false

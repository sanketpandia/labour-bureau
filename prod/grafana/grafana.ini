[server]
root_url = https://monitor.comradebot.cc
domain = monitor.comradebot.cc
# Allow origins for session validation (separate from CORS)
allowed_origins = https://monitor.comradebot.cc

[security]
# Disable CORS since we're behind reverse proxy
cors_enabled = false
cookie_secure = true
cookie_samesite = lax
allow_embedding = true

[users]
allow_sign_up = false

[analytics]
reporting_enabled = false

[log]
level = warn

[server]
root_url = https://monitor.comradebot.cc
domain = monitor.comradebot.cc

[security]
# Enable CORS with proper origin configuration
cors_enabled = true
cors_allow_origins = https://monitor.comradebot.cc
cors_allow_credentials = true

cookie_secure = true
cookie_samesite = lax
allow_embedding = true

[users]
allow_sign_up = false

[analytics]
reporting_enabled = false

[log]
level = warn

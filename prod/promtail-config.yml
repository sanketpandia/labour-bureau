server:
  http_listen_port: 9080
  log_level: info

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # Scrape Podman container logs from a shared log directory
  # Containers should write logs to /var/log/containers/<container-name>.log
  - job_name: podman-containers
    static_configs:
      - targets:
          - localhost
        labels:
          job: podman-containers
          source: podman
          __path__: /var/log/containers/*.log
    relabel_configs:
      # Extract container name from file path
      - source_labels: ['__path__']
        regex: '.*containers/([^/]+)\.log'
        target_label: 'container_name'
        replacement: '${1}'
      # Map container_name to service label for easier querying
      - source_labels: ['container_name']
        target_label: 'service'

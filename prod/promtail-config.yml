server:
  http_listen_port: 9080
  log_level: info

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # Scrape Podman container logs from a shared log directory
  # Containers should write logs to /var/log/containers/<container-name>.log
  - job_name: podman-containers
    static_configs:
      - targets:
          - localhost
        labels:
          job: podman-containers
          source: podman
          __path__: /var/log/containers/*.log
    pipeline_stages:
      # Extract container name from filename
      - regex:
          expression: '.*containers/(?P<container_name>[^/]+)\.log'
      # Map container_name to service label
      - labels:
          container_name: ""
          service: container_name
